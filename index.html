<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇幻冒險 - 60席核心局部切圖系統</title>
    <style>
        :root {
            --upr-color: linear-gradient(135deg, #ff007f, #7928ca, #00dfd8);
            --sr-color: linear-gradient(135deg, #f5515f, #9f031b);
            --r-color: linear-gradient(135deg, #4facfe, #00f2fe);
            --fire-color: #ef4444;
            --water-color: #3b82f6;
            --grass-color: #10b981;
            --bg-dark: #09090b;
            
            /* 調整格子的實體寬高，確保符合 3x4 黃金比例 */
            --card-width: 135px;
            --card-height: 180px; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #09090b;
            background-image: radial-gradient(circle at 50% 10%, #1e1b4b 0%, #09090b 80%);
            color: #fff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(20px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 75px;
            box-sizing: border-box;
        }

        /* 頂部狀態列 */
        .top-profile-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid #fff;}
        .energy-badge { background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); font-weight: bold;}

        /* 分頁切換 */
        .game-tab-content {
            display: none;
            flex: 1;
            padding: 15px;
            animation: fadeIn 0.3s ease-both;
        }
        .game-tab-content.active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* 開卡主頁 */
        .pack-dispenser-box {
            margin: 20px auto;
            width: 100%;
            max-width: 320px;
            background: linear-gradient(180deg, #312e81 0%, #1e1b4b 100%);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid #4338ca;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .pack-title { font-size: 20px; font-weight: 900; color: #fcd34d; margin-bottom: 15px; }
        
        .pack-graphic {
            width: 160px; height: 230px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            margin: 0 auto 20px; border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-weight: bold; font-size: 18px; border: 3px solid #f472b6; cursor: pointer;
        }
        
        .cards-roll-container {
            display: flex; gap: 15px; padding: 20px; overflow-x: auto; width: 100%;
            box-sizing: border-box; justify-content: flex-start;
        }

        /* 核心卡牌結構 (3x4) */
        .card-wrapper { width: var(--card-width); height: var(--card-height); flex-shrink: 0; }
        .card-inner {
            width: 100%; height: 100%; border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
            background: #1e1e2f; border: 2px solid rgba(255, 255, 255, 0.15);
            animation: slideInCard 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) both;
            position: relative;
        }
        @keyframes slideInCard { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .UPR .card-inner { border: 2.5px solid #ff007f; box-shadow: 0 0 15px rgba(255,0,127,0.5); }
        .SR .card-inner { border: 2px solid #ff7b00; box-shadow: 0 0 10px rgba(255,123,0,0.4); }
        .R .card-inner { border: 2px solid #3b82f6; }

        .card-header { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; background: rgba(0, 0, 0, 0.7); font-size: 10px; font-weight: bold; z-index: 5; }
        .rarity-tag { padding: 1px 4px; border-radius: 2px; font-size: 9px; font-weight: bold;}
        .UPR .rarity-tag { background: var(--upr-color); }
        .SR .rarity-tag { background: var(--sr-color); }
        .R .rarity-tag { background: var(--r-color); }

        .element-tag { padding: 1px 4px; border-radius: 3px; font-size: 9px; font-weight: bold; }
        .elem-fire { background-color: var(--fire-color); }
        .elem-water { background-color: var(--water-color); }
        .elem-grass { background-color: var(--grass-color); }

        /* 精準局部裁切視窗（主頁開卡專用） */
        .card-art-container { 
            flex: 1; width: 100%; background: #000; 
            position: relative; overflow: hidden; 
        }
        .sprite-clipper {
            position: absolute;
            width: 300%;  
            height: 400%; 
            max-width: none;
            object-fit: fill;
        }
        
        .card-id-badge { font-size: 9px; background: rgba(0,0,0,0.75); color: #fff; padding: 2px 6px; border-radius: 4px; position: absolute; bottom: 4px; right: 4px; z-index: 5; border: 1px solid rgba(255,255,255,0.1); }
        .card-footer { background: rgba(15, 23, 42, 0.95); padding: 5px 8px; font-size: 10px; z-index: 5; }
        .stat-row { display: flex; justify-content: space-between; color: #cbd5e1; }
        .stat-val { font-weight: bold; color: #fff; }

        .btn { padding: 12px 24px; border: none; border-radius: 30px; font-size: 15px; font-weight: bold; cursor: pointer; text-align: center; width: 100%; box-sizing: border-box; display: block; margin-bottom: 10px;}
        .btn-primary { background: linear-gradient(135deg, #fbbf24, #d97706); color: #fff; }
        .btn-secondary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; }

        /* 對戰競技場 */
        .battle-arena-wrapper { background: rgba(15,23,42,0.4); border-radius: 16px; padding: 15px; border: 1px dashed rgba(255,255,255,0.1); }
        .arena-slots { display: flex; justify-content: space-around; align-items: center; margin: 15px 0; position: relative; }
        .arena-slot { width: var(--card-width); height: var(--card-height); border: 2px dashed rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #64748b; background: rgba(0,0,0,0.3); overflow: visible; cursor: default; }
        .arena-slot .card-inner { cursor: pointer; }
        .vs-text { font-size: 26px; font-weight: 900; color: #ef4444; }
        .battle-log-board { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 12px; text-align: center; color: #fcd34d; font-weight: bold; min-height: 40px; font-size: 13px;}

        /* HP 條 */
        .hp-bar-track { height: 6px; width: 100%; background: rgba(255,255,255,0.15); }
        .hp-bar-fill { height: 100%; width: 100%; background: linear-gradient(90deg,#22c55e,#4ade80); transition: width 0.45s ease, background 0.3s ease; }
        .hp-bar-fill.low { background: linear-gradient(90deg,#ef4444,#f87171); }

        /* 飄浮傷害數字錨點 */
        .dmg-anchor { position: absolute; top: 0; width: var(--card-width); height: var(--card-height); pointer-events: none; z-index: 30; }
        #player-dmg-anchor { left: 0; }
        #enemy-dmg-anchor { right: 0; }

        @keyframes floatUpFade { 0% { transform: translate(-50%,0); opacity: 1; } 100% { transform: translate(-50%,-40px); opacity: 0; } }
        .dmg-float-text { position: absolute; left: 50%; top: 42%; font-size: 20px; font-weight: 900; color: #ef4444; text-shadow: 0 0 6px rgba(0,0,0,0.9); animation: floatUpFade 0.9s ease-out forwards; pointer-events: none; white-space: nowrap; }
        .element-burst-text { position: absolute; left: 50%; top: 18%; font-size: 10px; font-weight: 900; color: #fcd34d; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 6px; animation: floatUpFade 0.9s ease-out forwards; pointer-events: none; white-space: nowrap; }

        /* 攻擊/受擊/勝敗動畫 (置於 .card-inner 規則之後以覆蓋預設 animation) */
        @keyframes lungeRight { 0% { transform: translateX(0) scale(1); } 40% { transform: translateX(45px) scale(1.06) rotate(-2deg); } 100% { transform: translateX(0) scale(1); } }
        @keyframes lungeLeft { 0% { transform: translateX(0) scale(1); } 40% { transform: translateX(-45px) scale(1.06) rotate(2deg); } 100% { transform: translateX(0) scale(1); } }
        @keyframes shakeHit {
            0% { transform: translateX(0); box-shadow: 0 0 0 rgba(239,68,68,0); }
            15% { transform: translateX(-10px) rotate(-3deg); box-shadow: 0 0 25px rgba(239,68,68,0.9); }
            30% { transform: translateX(10px) rotate(3deg); }
            45% { transform: translateX(-8px) rotate(-2deg); }
            60% { transform: translateX(8px) rotate(2deg); }
            80% { transform: translateX(-4px); }
            100% { transform: translateX(0); box-shadow: 0 0 0 rgba(239,68,68,0); }
        }
        @keyframes victorPulse { 0%, 100% { box-shadow: 0 0 20px 4px rgba(250,204,21,0.6); } 50% { box-shadow: 0 0 35px 10px rgba(250,204,21,0.95); } }

        .lunge-right { animation: lungeRight 0.5s ease; position: relative; z-index: 20; }
        .lunge-left { animation: lungeLeft 0.5s ease; position: relative; z-index: 20; }
        .shake-hit { animation: shakeHit 0.45s ease; position: relative; z-index: 20; }
        .victor-glow { animation: victorPulse 1.1s ease-in-out infinite; border-color: #facc15 !important; }
        .defeat-fade { filter: grayscale(80%) brightness(0.6); transform: rotate(-4deg) translateY(6px); opacity: 0.75; transition: all 0.6s ease; }

        /* 集卡冊圖鑑滾動面板 */
        .album-scroll-box { flex: 1; overflow-y: auto; max-height: 65vh; padding-right: 5px; }
        .album-scroll-box::-webkit-scrollbar { width: 4px; }
        .album-scroll-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .album-list-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .album-card-box { 
            background: rgba(30, 41, 59, 0.2); border-radius: 8px; padding: 6px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.03); filter: grayscale(100%); opacity: 0.25; transition: all 0.2s;
        }
        .album-card-box.unlocked { filter: grayscale(0%); opacity: 1; border-color: #818cf8; background: rgba(30, 41, 59, 0.6); }
        
        /* 🔧 關鍵修復區：強制將集卡冊內部容器與圖片大小綁定，阻止大圖縮小塞入 */
        .album-preview-mini { 
            height: 110px; 
            border-radius: 6px; 
            overflow: hidden; 
            background: #000; 
            position: relative; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .album-preview-mini .sprite-clipper {
            position: absolute;
            width: 300%;       /* 放大三倍以容納橫向3格 */
            height: 400%;      /* 放大四倍以容納縱向4格 */
            max-width: none;   /* 覆蓋任何預設的 max-width: 100% 限制 */
            object-fit: fill;
        }

        .album-title-text { font-size: 11px; margin-top: 5px; font-weight: bold; }
        .album-count-badge { font-size: 9px; background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; display: inline-block; margin-top: 2px;}

        /* 檔案與備份 */
        .profile-data-card { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .profile-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        /* 底部固定導覽列 */
        .bottom-navigation-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #11131e; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; height: 100%; color: #94a3b8; font-size: 11px; cursor: pointer; gap: 4px; }
        .nav-tab-item.active { color: #a78bfa; font-weight: bold; background: rgba(255,255,255,0.02); }
        .nav-icon { font-size: 18px; }

        /* 卡片放大 + 3D 翻卡彈窗 */
        .zoom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.25s ease; padding: 20px; box-sizing: border-box;
        }
        .zoom-overlay.open { opacity: 1; pointer-events: auto; }
        .zoom-content { display: flex; flex-direction: column; align-items: center; max-width: 320px; width: 100%; }

        .flip-card-3d { width: 240px; height: 320px; perspective: 1400px; cursor: pointer; }
        .flip-inner-3d { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1); transform-style: preserve-3d; }
        .flip-inner-3d.flipped { transform: rotateY(180deg); }
        .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 14px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .flip-front .card-inner { animation: none !important; }
        .flip-back {
            transform: rotateY(180deg); background: linear-gradient(135deg, #312e81, #1e1b4b);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            border: 3px solid #6366f1; color: #a5b4fc; font-weight: 900; font-size: 16px; text-align: center; gap: 10px;
        }
        .zoom-caption { margin-top: 14px; font-size: 13px; color: #e2e8f0; text-align: center; font-weight: bold; }
        .zoom-hint { font-size: 11px; color: #94a3b8; margin-top: 6px; }
        .zoom-actions { display: flex; gap: 10px; width: 100%; margin-top: 14px; }
        .zoom-actions .btn { margin-bottom: 0; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- 頂部玩家狀態列 -->
        <div class="top-profile-bar">
            <div class="user-info">
                <div class="avatar">👑</div>
                <div>
                    <div style="font-weight: bold; font-size: 15px;">玩家</div>
                </div>
            </div>
            <div class="energy-badge">🔮 召喚石: <span id="top-tickets">999</span></div>
        </div>

        <!-- ==================== [分頁一：開卡主頁] ==================== -->
        <div id="tab-draw" class="game-tab-content active">
            <div class="pack-dispenser-box">
                <div class="pack-title">精緻星願卡包 (奇幻冒險)</div>
                <div class="pack-graphic" onclick="executeDrawGeneration()">
                    <div style="font-size: 36px; margin-bottom: 8px;">✨</div>
                    <div>大圖自動去重包</div>
                    <div style="font-size: 10px; color: #f472b6; margin-top: 5px;">內含 60 階單卡切像</div>
                </div>
                <button class="btn btn-primary" onclick="executeDrawGeneration()">開封限定包 (獲得5張)</button>
            </div>

            <div style="font-weight: bold; font-size: 13px; margin-top: 5px; border-left:3px solid #f472b6; padding-left:6px;">✨ 本次召喚結果 (點擊直接派遣)</div>
            <div class="cards-roll-container" id="recent-draws-container">
                <div style="color: #64748b; text-align: center; width: 100%; padding: 40px 0;">等待召喚...</div>
            </div>
        </div>

        <!-- ==================== [分頁二：對戰競技場] ==================== -->
        <div id="tab-battle" class="game-tab-content">
            <div style="font-weight: bold; font-size: 15px; margin-bottom: 10px;">⚔️ 戰力切片競技場</div>
            <div class="battle-arena-wrapper">
                <div class="arena-slots">
                    <div class="dmg-anchor" id="player-dmg-anchor"></div>
                    <div class="arena-slot" id="player-battle-slot">請在開卡分頁點選卡片上陣</div>
                    <div class="vs-text">VS</div>
                    <div class="arena-slot" id="enemy-battle-slot">等待對手</div>
                    <div class="dmg-anchor" id="enemy-dmg-anchor"></div>
                </div>
                <div class="battle-log-board" id="battle-log-screen">等待英靈就位...</div>
                <button class="btn btn-primary" id="fight-go-btn" onclick="runArenaFight()" disabled style="opacity:0.4; margin-top:15px;">啟動決鬥</button>
            </div>
        </div>

        <!-- ==================== [分頁三：集卡冊圖鑑] ==================== -->
        <div id="tab-album" class="game-tab-content">
            <div style="font-weight: bold; font-size: 15px; margin-bottom: 5px;">📜 60款單卡制霸集卡冊</div>
            <div style="font-size: 12px; color: #94a3b8; margin-bottom: 12px;">當前搜集度：<span id="album-progress-text">0</span> / 60 不同級別卡片</div>
            
            <div class="album-scroll-box">
                <div class="album-list-grid" id="album-grid-container">
                    <!-- 由 JavaScript 動態生成 60 個單格切圖 -->
                </div>
            </div>
        </div>

        <!-- ==================== [分頁四：玩家資訊與備份] ==================== -->
        <div id="tab-profile" class="game-tab-content">
            <div style="font-weight: bold; font-size: 15px; margin-bottom: 15px;">⚙️ 數據主控台</div>
            <div class="profile-data-card">
                <div class="profile-row"><span>名冊玩家</span><span>玩家</span></div>
                <div class="profile-row"><span>累計抽取次數</span><span id="stat-total-cards">0</span></div>
                <div class="profile-row"><span>60卡冊解鎖量</span><span id="stat-total-album">0 / 60</span></div>
            </div>
            <button class="btn btn-secondary" onclick="exportGameStateJSON()">📤 匯出目前數據存檔 (JSON)</button>
            <div class="file-input-wrapper">
                <button class="btn btn-primary">📥 匯入歷史數據存檔 (JSON)</button>
                <input type="file" id="json-file-loader" accept=".json" onchange="importGameStateJSON(event)">
            </div>
        </div>

        <!-- 底部固定導覽列 -->
        <div class="bottom-navigation-bar">
            <div class="nav-tab-item active" onclick="switchMainTab('draw', this)">
                <span class="nav-icon">🌸</span><span>開卡</span>
            </div>
            <div class="nav-tab-item" onclick="switchMainTab('battle', this)">
                <span class="nav-icon">⚔️</span><span>對戰</span>
            </div>
            <div class="nav-tab-item" onclick="switchMainTab('album', this)">
                <span class="nav-icon">📜</span><span>集卡冊</span>
            </div>
            <div class="nav-tab-item" onclick="switchMainTab('profile', this)">
                <span class="nav-icon">⚙️</span><span>資訊管理</span>
            </div>
        </div>

    </div>

    <!-- ==================== [卡片放大 + 3D 翻卡彈窗] ==================== -->
    <div class="zoom-overlay" id="card-zoom-overlay" onclick="closeCardZoom(event)">
        <div class="zoom-content" onclick="event.stopPropagation()">
            <div class="flip-card-3d" id="zoom-flip-card" onclick="toggleZoomFlip()">
                <div class="flip-inner-3d" id="zoom-flip-inner">
                    <div class="flip-face flip-front" id="zoom-front-face"></div>
                    <div class="flip-face flip-back">
                        <div style="font-size:34px;">🔮</div>
                        <div>奇幻冒險</div>
                        <div style="font-size:11px; color:#818cf8; font-weight:normal;">60席核心英靈錄</div>
                    </div>
                </div>
            </div>
            <div class="zoom-caption" id="zoom-caption"></div>
            <div class="zoom-hint">👆 點擊卡片可翻面看背面</div>
            <div class="zoom-actions">
                <button class="btn btn-primary" id="zoom-deploy-btn" style="display:none;" onclick="event.stopPropagation()">派遣上陣</button>
                <button class="btn btn-secondary" onclick="closeCardZoom()">關閉</button>
            </div>
        </div>
    </div>

    <script>
        const MASTER_CARD_DATABASE = {};
        const elementsPool = [{ name: '火', class: 'elem-fire' }, { name: '水', class: 'elem-water' }, { name: '草', class: 'elem-grass' }];

        for(let id = 1; id <= 60; id++) {
            let rarity = 'R';
            if (id <= 10) rarity = 'UPR';
            else if (id <= 25) rarity = 'SR';

            // 每張圖檔 (card1.png ~ card5.png) 內含 3欄 x 4列 = 12 張卡，5 張圖恰好對應 60 張卡
            const fileIndex = Math.floor((id - 1) / 12) + 1;
            const imgSrc = `card${fileIndex}.png`;

            const subIndex = (id - 1) % 12; 
            const clipX = (subIndex % 3) * 100;       // 3欄：0%, 100%, 200%
            const clipY = Math.floor(subIndex / 3) * 100; // 4列：0%, 100%, 200%, 300%

            MASTER_CARD_DATABASE[id] = {
                id: id,
                name: `${rarity}級英靈-序號${id}`,
                rarity: rarity,
                element: elementsPool[id % 3].name,
                elemClass: elementsPool[id % 3].class,
                imgSrc: imgSrc,
                clipX: clipX,
                clipY: clipY,
                baseAtk: 18 + (id % 12) + (rarity === 'UPR' ? 40 : rarity === 'SR' ? 20 : 0)
            };
        }

        let gameState = { tickets: 999, totalCardsDrawn: 0, albumCollection: {} };
        for(let id = 1; id <= 60; id++) { gameState.albumCollection[id] = 0; }

        let slotPlayerCard = null;
        let slotEnemyCard = null;

        function buildAlbumDOMTemplate() {
            const grid = document.getElementById('album-grid-container');
            grid.innerHTML = '';
            for(let id = 1; id <= 60; id++) {
                const meta = MASTER_CARD_DATABASE[id];
                const item = document.createElement('div');
                item.className = 'album-card-box';
                item.id = `album-box-${id}`;
                item.style.cursor = 'pointer';
                item.onclick = () => openCardZoom({
                    id: id, rarity: meta.rarity, element: meta.element, elemClass: meta.elemClass,
                    imgSrc: meta.imgSrc, clipX: meta.clipX, clipY: meta.clipY, atk: meta.baseAtk
                }, { deployable: false, ownedQty: gameState.albumCollection[id] || 0 });
                item.innerHTML = `
                    <div class="album-preview-mini">
                        <img src="${meta.imgSrc}" class="sprite-clipper" style="left: -${meta.clipX}%; top: -${meta.clipY}%;">
                    </div>
                    <div class="album-title-text" style="color:${meta.rarity==='UPR'?'#ff007f':meta.rarity==='SR'?'#ff7b00':'#3b82f6'}">#${id} ${meta.rarity}</div>
                    <div class="album-count-badge" id="album-count-${id}">未擁有</div>
                `;
                grid.appendChild(item);
            }
        }

        function switchMainTab(tabId, element) {
            document.querySelectorAll('.game-tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-tab-item').forEach(item => item.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            element.classList.add('active');
        }

        function executeDrawGeneration() {
            if(gameState.tickets < 1) return alert("召喚石不足");
            gameState.tickets -= 1;
            const container = document.getElementById('recent-draws-container');
            container.innerHTML = '';

            for(let i = 0; i < 5; i++) {
                const randomId = Math.floor(Math.random() * 60) + 1;
                const meta = MASTER_CARD_DATABASE[randomId];

                const dynamicLevel = Math.floor(Math.random() * 30) + 15;
                const finalAtk = meta.baseAtk + Math.floor(dynamicLevel * 0.7);
                const spd = (Math.random() * 4 + 2).toFixed(1);

                gameState.totalCardsDrawn++;
                gameState.albumCollection[randomId]++; 

                const cardPayload = {
                    id: randomId, rarity: meta.rarity, level: dynamicLevel,
                    atk: finalAtk, spd: spd, element: meta.element,
                    elemClass: meta.elemClass, imgSrc: meta.imgSrc, clipX: meta.clipX, clipY: meta.clipY
                };

                const wrap = document.createElement('div');
                wrap.className = `card-wrapper ${meta.rarity}`;
                wrap.onclick = () => openCardZoom(cardPayload, { deployable: true });
                wrap.innerHTML = `
                    <div class="card-inner">
                        <div class="card-header">
                            <span class="rarity-tag">${meta.rarity}</span>
                            <span class="element-tag ${meta.elemClass}">${meta.element}</span>
                            <span style="color:#ffcc00;">Lv.${dynamicLevel}</span>
                        </div>
                        <div class="card-art-container">
                            <img src="${meta.imgSrc}" class="sprite-clipper" style="left: -${meta.clipX}%; top: -${meta.clipY}%;">
                            <div class="card-id-badge">No.${randomId}</div>
                        </div>
                        <div class="card-footer">
                            <div class="stat-row"><span>⚔️ ATK</span><span class="stat-val">${finalAtk}</span></div>
                            <div class="stat-row"><span>⚡ SPD</span><span class="stat-val">${spd}</span></div>
                        </div>
                    </div>
                `;
                container.appendChild(wrap);
            }
            refreshUI();
        }

        function sendToBattleField(cardData) {
            slotPlayerCard = cardData;
            document.getElementById('player-battle-slot').innerHTML = buildSlotCardHTML(cardData, 'player');
            document.getElementById('player-battle-slot').onclick = () => openCardZoom(slotPlayerCard, { deployable: false });
            
            const enemyId = Math.floor(Math.random() * 60) + 1;
            const emeta = MASTER_CARD_DATABASE[enemyId];
            slotEnemyCard = {
                rarity: emeta.rarity, level: 30, atk: emeta.baseAtk + 15,
                spd: (Math.random() * 4 + 2).toFixed(1),
                element: emeta.element, elemClass: emeta.elemClass,
                imgSrc: emeta.imgSrc, clipX: emeta.clipX, clipY: emeta.clipY, id: enemyId
            };
            document.getElementById('enemy-battle-slot').innerHTML = buildSlotCardHTML(slotEnemyCard, 'enemy');
            document.getElementById('enemy-battle-slot').onclick = () => openCardZoom(slotEnemyCard, { deployable: false });

            clearBattleVisualState();
            updateHpBar('player', 100);
            updateHpBar('enemy', 100);
            
            const btn = document.getElementById('fight-go-btn');
            btn.disabled = false; btn.style.opacity = "1";
            document.getElementById('battle-log-screen').innerText = "英靈 No." + cardData.id + " 已就緒，可以開戰！";
            switchMainTab('battle', document.querySelectorAll('.nav-tab-item')[1]);
        }

        function buildSlotCardHTML(d, side) {
            return `
                <div class="card-inner" style="width:100%; height:100%;">
                    <div class="card-header">
                        <span class="rarity-tag">${d.rarity}</span>
                        <span class="element-tag ${d.elemClass}">${d.element}</span>
                    </div>
                    <div class="hp-bar-track"><div class="hp-bar-fill" id="${side}-hp-fill" style="width:100%"></div></div>
                    <div class="card-art-container">
                        <img src="${d.imgSrc}" class="sprite-clipper" style="left: -${d.clipX}%; top: -${d.clipY}%;">
                        <div class="card-id-badge">No.${d.id}</div>
                    </div>
                    <div class="card-footer">
                        <div class="stat-row"><span>⚔️ ATK</span><span class="stat-val">${d.atk}</span></div>
                    </div>
                </div>
            `;
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function hasElementAdvantage(a, b) {
            return (a === '水' && b === '火') || (a === '火' && b === '草') || (a === '草' && b === '水');
        }

        function updateHpBar(side, val) {
            const fill = document.getElementById(`${side}-hp-fill`);
            if (!fill) return;
            fill.style.width = Math.max(0, val) + '%';
            fill.classList.toggle('low', val <= 30);
        }

        function clearBattleVisualState() {
            document.querySelectorAll('.arena-slot .card-inner').forEach(el => {
                el.classList.remove('victor-glow', 'defeat-fade', 'lunge-right', 'lunge-left', 'shake-hit');
                el.style.transform = '';
            });
            document.getElementById('player-dmg-anchor').innerHTML = '';
            document.getElementById('enemy-dmg-anchor').innerHTML = '';
        }

        function spawnDamageFloat(side, dmg) {
            const anchor = document.getElementById(`${side}-dmg-anchor`);
            if (!anchor) return;
            const el = document.createElement('div');
            el.className = 'dmg-float-text';
            el.innerText = `-${dmg}`;
            anchor.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        function showElementBurst(side) {
            const anchor = document.getElementById(`${side}-dmg-anchor`);
            if (!anchor) return;
            const el = document.createElement('div');
            el.className = 'element-burst-text';
            el.innerText = '屬性剋制！';
            anchor.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        function playAttackAnimation(attackerSide, defenderSide, dmg) {
            return new Promise(resolve => {
                const attackerInner = document.querySelector(`#${attackerSide}-battle-slot .card-inner`);
                const defenderInner = document.querySelector(`#${defenderSide}-battle-slot .card-inner`);
                const lungeClass = attackerSide === 'player' ? 'lunge-right' : 'lunge-left';
                if (attackerInner) attackerInner.classList.add(lungeClass);
                setTimeout(() => {
                    if (defenderInner) defenderInner.classList.add('shake-hit');
                    spawnDamageFloat(defenderSide, dmg);
                }, 220);
                setTimeout(() => {
                    if (attackerInner) attackerInner.classList.remove(lungeClass);
                    if (defenderInner) defenderInner.classList.remove('shake-hit');
                    resolve();
                }, 600);
            });
        }

        function playVictorySequence(winnerSide, loserSide) {
            const winnerInner = document.querySelector(`#${winnerSide}-battle-slot .card-inner`);
            const loserInner = document.querySelector(`#${loserSide}-battle-slot .card-inner`);
            if (winnerInner) winnerInner.classList.add('victor-glow');
            if (loserInner) loserInner.classList.add('defeat-fade');
        }

        async function runArenaFight() {
            if (!slotPlayerCard || !slotEnemyCard) return;
            const fightBtn = document.getElementById('fight-go-btn');
            fightBtn.disabled = true; fightBtn.style.opacity = "0.4";
            const screen = document.getElementById('battle-log-screen');

            clearBattleVisualState();
            let pHp = 100, eHp = 100;
            updateHpBar('player', pHp);
            updateHpBar('enemy', eHp);

            const pAtk = parseInt(slotPlayerCard.atk);
            const eAtk = parseInt(slotEnemyCard.atk);
            const pAdvantage = hasElementAdvantage(slotPlayerCard.element, slotEnemyCard.element);
            const eAdvantage = hasElementAdvantage(slotEnemyCard.element, slotPlayerCard.element);
            const pSpd = parseFloat(slotPlayerCard.spd) || (Math.random() * 4 + 2);
            const eSpd = parseFloat(slotEnemyCard.spd) || (Math.random() * 4 + 2);

            screen.innerText = "⚔️ 戰鬥開始！";
            await sleep(500);

            let round = 1;
            while (pHp > 0 && eHp > 0 && round <= 6) {
                screen.innerText = `第 ${round} 回合交鋒中...`;
                const order = pSpd >= eSpd ? ['player', 'enemy'] : ['enemy', 'player'];
                for (const attacker of order) {
                    if (pHp <= 0 || eHp <= 0) break;
                    if (attacker === 'player') {
                        let dmg = Math.max(5, pAtk - Math.floor(eAtk * 0.3) + Math.floor(Math.random() * 8));
                        if (pAdvantage) { dmg += 15; showElementBurst('player'); }
                        eHp = Math.max(0, eHp - dmg);
                        await playAttackAnimation('player', 'enemy', dmg);
                        updateHpBar('enemy', eHp);
                    } else {
                        let dmg = Math.max(5, eAtk - Math.floor(pAtk * 0.3) + Math.floor(Math.random() * 8));
                        if (eAdvantage) { dmg += 15; showElementBurst('enemy'); }
                        pHp = Math.max(0, pHp - dmg);
                        await playAttackAnimation('enemy', 'player', dmg);
                        updateHpBar('player', pHp);
                    }
                    await sleep(250);
                }
                round++;
            }

            await sleep(200);
            if (pHp <= 0 && eHp <= 0) {
                screen.innerHTML = `<span style="color:#fbbf24;">⚡ 兩敗俱傷！</span>`;
            } else if (eHp <= 0 || (pHp > eHp)) {
                screen.innerHTML = `<span style="color:#10b981;">👑 決鬥大勝！</span><br>我方成功擊敗對手 No.${slotEnemyCard.id}`;
                playVictorySequence('player', 'enemy');
            } else {
                screen.innerHTML = `<span style="color:#ef4444;">❌ 慘遭落敗...</span><br>對手 No.${slotEnemyCard.id} 火力壓制`;
                playVictorySequence('enemy', 'player');
            }
        }

        function buildZoomFrontHTML(d) {
            const levelLine = d.level ? `<span style="color:#ffcc00;">Lv.${d.level}</span>` : '';
            const spdLine = d.spd ? `<div class="stat-row"><span>⚡ SPD</span><span class="stat-val">${d.spd}</span></div>` : '';
            return `
                <div class="card-inner" style="width:100%; height:100%;">
                    <div class="card-header">
                        <span class="rarity-tag">${d.rarity}</span>
                        <span class="element-tag ${d.elemClass}">${d.element}</span>
                        ${levelLine}
                    </div>
                    <div class="card-art-container">
                        <img src="${d.imgSrc}" class="sprite-clipper" style="left: -${d.clipX}%; top: -${d.clipY}%;">
                        <div class="card-id-badge">No.${d.id}</div>
                    </div>
                    <div class="card-footer">
                        <div class="stat-row"><span>⚔️ ATK</span><span class="stat-val">${d.atk}</span></div>
                        ${spdLine}
                    </div>
                </div>
            `;
        }

        function openCardZoom(d, options = {}) {
            const overlay = document.getElementById('card-zoom-overlay');
            const frontFace = document.getElementById('zoom-front-face');
            const inner = document.getElementById('zoom-flip-inner');
            const caption = document.getElementById('zoom-caption');
            const deployBtn = document.getElementById('zoom-deploy-btn');

            inner.classList.remove('flipped');
            frontFace.innerHTML = buildZoomFrontHTML(d);

            let capText = `${d.rarity} 級英靈 ・ No.${d.id}`;
            if (options.ownedQty !== undefined) {
                capText += options.ownedQty > 0 ? ` ・ 擁有 ${options.ownedQty} 張` : ` ・ 尚未擁有`;
            }
            caption.innerText = capText;

            if (options.deployable) {
                deployBtn.style.display = 'block';
                deployBtn.onclick = (e) => { e.stopPropagation(); closeCardZoom(); sendToBattleField(d); };
            } else {
                deployBtn.style.display = 'none';
            }

            overlay.classList.add('open');
        }

        function closeCardZoom(event) {
            if (event && event.target.id !== 'card-zoom-overlay') return;
            document.getElementById('card-zoom-overlay').classList.remove('open');
        }

        function toggleZoomFlip() {
            document.getElementById('zoom-flip-inner').classList.toggle('flipped');
        }

        function refreshUI() {
            document.getElementById('top-tickets').innerText = gameState.tickets;
            document.getElementById('stat-total-cards').innerText = gameState.totalCardsDrawn;
            
            let uniqueUnlockedCount = 0;
            for(let id = 1; id <= 60; id++) {
                const qty = gameState.albumCollection[id] || 0;
                const box = document.getElementById(`album-box-${id}`);
                const badge = document.getElementById(`album-count-${id}`);
                
                if(box && badge) {
                    if(qty > 0) {
                        box.classList.add('unlocked');
                        badge.innerText = `擁有: ${qty} 張`;
                        uniqueUnlockedCount++;
                    } else {
                        box.classList.remove('unlocked');
                        badge.innerText = `未擁有`;
                    }
                }
            }
            document.getElementById('album-progress-text').innerText = uniqueUnlockedCount;
            document.getElementById('stat-total-album').innerText = `${uniqueUnlockedCount} / 60`;
        }

        function exportGameStateJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(gameState, null, 4));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", `card_game_save.json`);
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        }

        function importGameStateJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.hasOwnProperty('albumCollection')) {
                        gameState = parsed; refreshUI();
                        alert("🎉 存檔資料加載完成！");
                    }
                } catch(err) { alert("讀取失敗"); }
            };
            reader.readAsText(file);
        }

        buildAlbumDOMTemplate();
        refreshUI();
    </script>
</body>
</html>
